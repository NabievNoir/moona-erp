<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>MOONA ERP</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    body{margin:0;background:#0a0a0a;color:#f0f0f0;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .logo{width:70px;height:70px;background:linear-gradient(135deg,#e65c00,#ff8c00);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:#1a1a1a;margin:0 auto 16px}
    h1{color:#ff8c00;font-size:24px;margin-bottom:8px;text-align:center}
    p{color:#888;font-size:14px;margin-bottom:24px;text-align:center}
    input{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:8px;padding:10px 14px;color:#f0f0f0;font-size:14px;width:100%;margin-bottom:10px;box-sizing:border-box;outline:none}
    button{background:linear-gradient(135deg,#e65c00,#ff8c00);border:none;border-radius:8px;padding:12px;width:100%;color:#1a1a1a;font-size:15px;font-weight:700;cursor:pointer}
    .card{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:12px;padding:28px;width:300px}
    .err{color:#f87171;font-size:12px;margin-bottom:8px}
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const{useState,createElement:h}=React;
    const USERS=[
      {id:1,login:'admin', pass:'1111',name:'Sardor', rl:'Администратор'},
      {id:2,login:'agent1',pass:'2222',name:'Bobur',  rl:'Агент'},
      {id:3,login:'agent2',pass:'3333',name:'Kamol',  rl:'Агент'},
      {id:4,login:'driver1',pass:'4444',name:'Jahon', rl:'Доставщик'},
      {id:5,login:'wh1',   pass:'5555',name:'Ulmas',  rl:'Завхоз (Склад)'},
      {id:6,login:'mgr1',  pass:'6666',name:'Mansur', rl:'Менеджер'},
      {id:7,login:'merch1',pass:'7777',name:'Dilnoza',rl:'Мерчандайзер'},
      {id:8,login:'dp1',   pass:'8888',name:'Nodir',  rl:'Завхоз (РП)'},
    ];
    function App(){
      const[lg,setLg]=useState('');
      const[pw,setPw]=useState('');
      const[err,setErr]=useState('');
      const[user,setUser]=useState(null);
      const go=()=>{
        const u=USERS.find(x=>x.login===lg&&x.pass===pw);
        if(u){setUser(u);setErr('');}
        else setErr('Неверный логин или пароль');
      };
      if(user) return h('div',{style:{textAlign:'center',padding:40}},
        h('div',{className:'logo'},'M'),
        h('h1',null,'Добро пожаловать, '+user.name+'!'),
        h('p',null,user.rl),
        h('p',{style:{color:'#ff8c00',marginTop:20}},'✅ Vercel работает! Загружаем полную систему...')
      );
      return h('div',{className:'card'},
        h('div',{className:'logo'},'M'),
        h('h1',null,'MOONA ERP'),
        h('p',null,'Войдите в систему'),
        h('input',{placeholder:'Логин',value:lg,onChange:e=>setLg(e.target.value)}),
        h('input',{placeholder:'Пароль',type:'password',value:pw,
          onChange:e=>setPw(e.target.value),onKeyDown:e=>e.key==='Enter'&&go()}),
        err&&h('div',{className:'err'},err),
        h('button',{onClick:go},'Войти')
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
