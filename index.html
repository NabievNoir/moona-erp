function Login({onLogin,users}){
  const[lg,setLg]=useState(""),[ pw,setPw]=useState(""),[ er,setEr]=useState("");

  return(
    <div style={{minHeight:"100vh",background:BG,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"IBM Plex Sans,sans-serif",color:TX}}>

          <div style={{fontSize:19,fontWeight:800,letterSpacing:2}}>MOONA ERP</div>
          <div style={{fontSize:12,color:MU,marginTop:3}}>Система управления</div>
        </div>
        <div style={lbl}>Логин</div>
        <input value={lg} onChange={e=>setLg(e.target.value)} placeholder="login" style={inp}/>
        <div style={lbl}>Пароль</div>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••" style={inp} onKeyDown={e=>e.key==="Enter"&&go()}/>
        {er&&<div style={{color:"#f87171",fontSize:12,marginBottom:10}}>{er}</div>}
        <button onClick={go} style={{...Btn(),width:"100%",padding:11,fontSize:14,marginBottom:14}}>Войти</button>

            {(users||USERS).map(u=>(

    </div>
  );
}

              {!["cancelled","delivered","confirming"].includes(o.status)&&isAdmin&&<button style={{...Btn("#da3633"),fontSize:12,padding:"5px 11px"}} onClick={()=>onUpd(o.id,{status:"cancelled"})}>Отменить</button>}
            </div>
          )}
          {ro&&<div style={{fontSize:11,color:MU,fontStyle:"italic",marginTop:6}}>👁 Только просмотр</div>}
          {!ro&&o.status==="confirming"&&onUpd&&(
            <div style={{marginTop:8}}>

      )}
    </div>
  );
}

function TodayStats({ords,mkts}){
  const td=tod();
  const paidToday=ords.reduce((s,o)=>s+o.pays.filter(p=>p.date===td).reduce((a,p)=>a+p.amt,0),0);
  const mktsShipped=[...new Set(ords.filter(o=>o.date===td).map(o=>o.mid))].length;
  const unitsShipped=ords.filter(o=>o.date===td).reduce((s,o)=>s+o.items.reduce((a,i)=>a+i.q,0),0);
  const newMkts=mkts.filter(m=>m.addedDate===td).length;
  const stats=[
    {label:"Оплачено сегодня",        val:fm(paidToday),       color:"#ff8c00",icon:"💳",sub:"от клиентов"},
    {label:"Маркетов отгружено",       val:mktsShipped,         color:"#60a5fa",icon:"🏪",sub:"уникальных точек"},
    {label:"Единиц товара отгружено",  val:unitsShipped+" ед.", color:"#f59e0b",icon:"📦",sub:"по всем заказам"},
    {label:"Новых маркетов",           val:newMkts,             color:"#f472b6",icon:"➕",sub:"добавлено сегодня"},
  ];
  return(
    <div>
      <div style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:1,marginBottom:12}}>СЕГОДНЯ</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:12,marginBottom:22}}>
        {stats.map(s=>(
          <div key={s.label} style={Card}>
            <div style={{fontSize:24,marginBottom:8}}>{s.icon}</div>
            <div style={{fontSize:11,color:MU,fontWeight:600,marginBottom:5}}>{s.label}</div>
            <div style={{fontSize:22,fontWeight:800,color:s.color,marginBottom:3}}>{s.val}</div>
            <div style={{fontSize:11,color:MU}}>{s.sub}</div>

        ))}

    </div>
  );
}

function MktList({mkts,userId,onAdd}){
  const[search,setSearch]=useState("");
  const[sortBy,setSortBy]=useState("name");
  const[onlyMine,setOnlyMine]=useState(false);
  const filtered=[...mkts]
    .filter(m=>{
      const s=search.toLowerCase();
      return(m.name.toLowerCase().includes(s)||m.addr.toLowerCase().includes(s))&&(!onlyMine||m.by===userId);
    })
    .sort((a,b)=>sortBy==="name"?a.name.localeCompare(b.name,"ru"):a.addr.localeCompare(b.addr,"ru"));
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:19,fontWeight:800}}>Маркеты</div>
        <button style={Btn()} onClick={onAdd}>+ Новый маркет</button>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Поиск..." style={{...inp,marginBottom:10}}/>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <button onClick={()=>setOnlyMine(v=>!v)} style={{padding:"7px 13px",borderRadius:8,border:brd,cursor:"pointer",fontSize:12,fontWeight:600,background:onlyMine?"#60a5fa":SF,color:onlyMine?"#fff":MU}}>{onlyMine?"✓ Мои":"Все маркеты"}</button>
        <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:brd}}>
          {[["name","По имени"],["addr","По району"]].map(([v,l])=>(
            <button key={v} onClick={()=>setSortBy(v)} style={{padding:"7px 12px",border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:sortBy===v?"#e65c00":SF,color:sortBy===v?"#fff":MU}}>{l}</button>
          ))}
        </div>
        <span style={{fontSize:11,color:MU,alignSelf:"center"}}>{filtered.length} из {mkts.length}</span>
      </div>
      {filtered.map(m=>(
        <div key={m.id} style={{...Card,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:3}}>{m.name}</div>
              <div style={{fontSize:12,color:MU,marginBottom:2}}>📍 {m.addr}</div>
              <a href={"tel:"+m.tel} style={{fontSize:12,color:"#60a5fa",textDecoration:"none"}}>☎ {m.tel}</a>
            </div>
            {m.by===userId&&<span style={{...Bdg("#60a5fa","#60a5fa22"),flexShrink:0,marginLeft:10}}>Мой</span>}
          </div>
        </div>
      ))}
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:MU}}>Ничего не найдено</div>}
    </div>
  );
}

function DelivPage({ords,mkts,prods,userId,onUpd,onPendingPay}){
  const[filter,setFilter]=useState("active");
  const[sort,setSort]=useState("date");
  const[payOrdId,setPayOrdId]=useState(null);

  const myOrds=ords.filter(o=>o.did===userId||(o.status==="in_delivery"&&!o.did));
  const filtered=[...myOrds]
    .filter(o=>{
      if(filter==="active") return["in_delivery","approved"].includes(o.status);
      if(filter==="delivered") return o.status==="delivered";
      return true;
    })
    .sort((a,b)=>{
      if(sort==="date") return b.date.localeCompare(a.date);
      if(sort==="amount") return b.tot-a.tot;
      if(sort==="debt") return(b.tot-b.paid)-(a.tot-a.paid);
      return 0;
    });

  return(
    <div>
      <div style={{fontSize:19,fontWeight:800,marginBottom:14}}>Мои доставки</div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:brd}}>
          {[["active","В работе"],["delivered","Доставлено"],["all","Все"]].map(([v,l])=>(
            <button key={v} onClick={()=>setFilter(v)} style={{padding:"7px 12px",border:"none",cursor:"pointer",fontWeight:600,fontSize:12,background:filter===v?"#e65c00":SF,color:filter===v?"#fff":MU}}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:brd}}>
          {[["date","По дате"],["amount","По сумме"],["debt","По долгу"]].map(([v,l])=>(
            <button key={v} onClick={()=>setSort(v)} style={{padding:"7px 12px",border:"none",cursor:"pointer",fontWeight:600,fontSize:12,background:sort===v?"#1f6feb":SF,color:sort===v?"#fff":MU}}>{l}</button>
          ))}
        </div>
        <span style={{fontSize:11,color:MU,alignSelf:"center"}}>{filtered.length} заказов</span>
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:MU}}><div style={{fontSize:36,marginBottom:12}}>🚚</div>Нет доставок</div>}
      {filtered.map(o=>{
        const m=mkts.find(x=>x.id===o.mid)||{};
        const s=ST[o.status]||{};
        const dbt=o.tot-o.paid;
        const hasPending=(o.pendingPays||[]).length>0;
        return(
          <div key={o.id} style={{...Card,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{m.name}</div>
                <div style={{fontSize:12,color:MU}}>📍 {m.addr}</div>
                <a href={"tel:"+m.tel} style={{fontSize:12,color:"#60a5fa",textDecoration:"none"}}>☎ {m.tel}</a>
              </div>
              <div style={{textAlign:"right"}}>
                <span style={{...Bdg(s.c,s.b),display:"block",marginBottom:4}}>{s.label}</span>
                <div style={{fontSize:13,fontWeight:700}}>{fm(o.tot)}</div>
                {dbt>0&&<div style={{fontSize:11,color:"#f87171"}}>Долг: {fm(dbt)}</div>}
                {dbt===0&&<div style={{fontSize:11,color:"#ff8c00"}}>✓ Оплачено</div>}
              </div>
            </div>
            <div style={{background:BG,borderRadius:8,padding:10,marginBottom:10}}>
              {o.items.map((it,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
                  <span style={{color:MU}}>{pn(prods,it.pid)}</span>
                  <span style={{fontWeight:600}}>{it.q} {pu(prods,it.pid)}</span>
                </div>
              ))}
              <div style={{borderTop:brd,marginTop:7,paddingTop:7,display:"flex",justifyContent:"space-between",fontWeight:700,fontSize:13}}><span>Итого</span><span>{fm(o.tot)}</span></div>
              <div style={{fontSize:11,color:o.type==="cash"?"#ff8c00":"#f59e0b",marginTop:3,fontWeight:600}}>{o.type==="cash"?"💵 Наличные":"📋 Реализация"}</div>
            </div>
            {o.note&&<div style={{fontSize:12,color:"#f59e0b",marginBottom:10}}>📝 {o.note}</div>}
            {o.pays.map(p=>(
              <div key={p.id} style={{display:"flex",gap:8,fontSize:12,color:MU,marginBottom:3}}>
                <span>{fd(p.date)}</span><span style={{color:"#ff8c00",fontWeight:700}}>+{fm(p.amt)}</span><span>{p.note}</span>
              </div>
            ))}
            {hasPending&&(
              <div style={{background:"#f59e0b20",border:"1px solid #f59e0b55",borderRadius:8,padding:9,marginBottom:10,fontSize:12,color:"#f59e0b"}}>
                ⏳ Платёж {fm((o.pendingPays||[]).reduce((s,p)=>s+p.amt,0))} — ожидает подтверждения
              </div>
            )}
            {o.status==="in_delivery"&&payOrdId!==o.id&&(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <button style={{...Btn("#ff8c00"),color:"#0d1117",width:"100%",padding:11,fontSize:14}} onClick={()=>setPayOrdId(o.id)}>💳 Доставить и принять оплату</button>
                <button style={{...Btn("#555"),width:"100%",padding:10,fontSize:13}} onClick={()=>onUpd(o.id,{status:"confirming"})}>✓ Доставить без оплаты</button>
              </div>
            )}
            {o.status==="in_delivery"&&payOrdId===o.id&&(
              <PayForm dbt={dbt} onSave={(amt,method,note)=>{onPendingPay(o.id,amt,method,note);onUpd(o.id,{status:"confirming"});setPayOrdId(null);}} onCancel={()=>setPayOrdId(null)}/>
            )}
            {o.status==="delivered"&&dbt>0&&!hasPending&&payOrdId!==o.id&&(
              <button style={{...Btn("#1f6feb"),width:"100%",padding:10,fontSize:13}} onClick={()=>setPayOrdId(o.id)}>💳 Внести оплату</button>
            )}
            {o.status==="delivered"&&payOrdId===o.id&&(
              <PayForm dbt={dbt} onSave={(amt,method,note)=>{onPendingPay(o.id,amt,method,note);setPayOrdId(null);}} onCancel={()=>setPayOrdId(null)}/>
            )}
          </div>
        );
      })}
    </div>
  );
}

function PayForm({dbt,onSave,onCancel}){
  const[amt,setAmt]=useState("");
  const[method,setMethod]=useState("cash");
  const[note,setNote]=useState("");
  return(
    <div style={{background:BG,borderRadius:10,padding:14,border:brd}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>💳 Принять оплату</div>
      <div style={{fontSize:12,color:"#f87171",fontWeight:700,marginBottom:10}}>Долг: {fm(dbt)}</div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <button onClick={()=>setMethod("cash")} style={{flex:1,padding:9,borderRadius:7,border:brd,cursor:"pointer",fontWeight:700,fontSize:13,background:method==="cash"?"#e65c00":SF,color:method==="cash"?"#fff":MU}}>💵 Наличные</button>
        <button onClick={()=>setMethod("transfer")} style={{flex:1,padding:9,borderRadius:7,border:brd,cursor:"pointer",fontWeight:700,fontSize:13,background:method==="transfer"?"#1f6feb":SF,color:method==="transfer"?"#fff":MU}}>🏦 Перечисление</button>
      </div>
      <input type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="Сумма (сум)" style={inp}/>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {[dbt,Math.round(dbt/2)].map(v=>(
          <button key={v} onClick={()=>setAmt(String(v))} style={{flex:1,padding:6,borderRadius:6,border:brd,background:SF,color:MU,fontSize:12,cursor:"pointer"}}>{fm(v)}</button>
        ))}
      </div>
      <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Комментарий..." style={inp}/>
      <div style={{display:"flex",gap:8}}>
        <button onClick={onCancel} style={{flex:1,padding:9,borderRadius:8,border:brd,background:"transparent",color:MU,fontSize:13,cursor:"pointer"}}>Отмена</button>
        <button onClick={()=>{const a=parseFloat(amt);if(a>0)onSave(a,method,note||"");}} style={{...Btn("#ff8c00"),color:"#0d1117",flex:2,padding:9,fontSize:14}}>✓ Отправить</button>
      </div>
    </div>
  );
}

function MgrStats({ords,mkts}){

  const[dateFrom,setDateFrom]=useState("");
  const[dateTo,setDateTo]=useState("");

  const filtered=ords.filter(o=>{
    if(driverId&&o.did!==+driverId) return false;
    if(dateFrom&&o.date<dateFrom) return false;
    if(dateTo&&o.date>dateTo) return false;
    return["delivered","confirming"].includes(o.status);
  });

  const totalDelivered=filtered.length;
  const totalUnits=filtered.reduce((s,o)=>s+o.items.reduce((a,i)=>a+i.q,0),0);
  const totalCollected=filtered.reduce((s,o)=>s+o.pays.reduce((a,p)=>a+p.amt,0),0);
  const totalPending=filtered.reduce((s,o)=>s+(o.pendingPays||[]).reduce((a,p)=>a+p.amt,0),0);
  const totalDebt=filtered.reduce((s,o)=>s+Math.max(0,o.tot-o.paid),0);

  const byDriver=drivers.map(d=>{
    const dOrds=filtered.filter(o=>o.did===d.id);
    return{
      ...d,
      cnt:dOrds.length,
      units:dOrds.reduce((s,o)=>s+o.items.reduce((a,i)=>a+i.q,0),0),
      collected:dOrds.reduce((s,o)=>s+o.pays.reduce((a,p)=>a+p.amt,0),0),
      pending:dOrds.reduce((s,o)=>s+(o.pendingPays||[]).reduce((a,p)=>a+p.amt,0),0),
      debt:dOrds.reduce((s,o)=>s+Math.max(0,o.tot-o.paid),0),
    };
  }).filter(d=>d.cnt>0||!driverId);

  return(
    <div>
      <div style={{fontSize:19,fontWeight:800,marginBottom:16}}>📊 Статистика доставщиков</div>

      <div style={{...Card,marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:"#60a5fa",marginBottom:10}}>🔍 ФИЛЬТРЫ (ДОСТАВЩИК + ДАТЫ)</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:160}}>
            <div style={{fontSize:11,color:MU,fontWeight:600,marginBottom:4}}>Доставщик</div>
            <select value={driverId} onChange={e=>setDriverId(e.target.value)}
              style={{width:"100%",background:BG,border:brd,borderRadius:8,padding:"8px 10px",color:TX,fontSize:13,outline:"none"}}>
              <option value="">Все доставщики</option>
              {drivers.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}

          </div>

            <div style={{fontSize:11,color:MU,fontWeight:600,marginBottom:4}}>С даты</div>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}

          </div>
          <div style={{flex:1,minWidth:140}}>

function PayApprove({ords,mkts,prods,onApprove,onReject,onConfirmDeliv,users}){
  const drivers=(users||USERS).filter(u=>u.role==="driver");
  const[driverId,setDriverId]=useState("");
  const[dateFrom,setDateFrom]=useState("");
  const[dateTo,setDateTo]=useState("");

  const inRange=(date,did)=>{
    if(driverId&&did!==+driverId) return false;
    if(dateFrom&&date<dateFrom) return false;
    if(dateTo&&date>dateTo) return false;
    return true;
  };

  const confirming=ords.filter(o=>o.status==="confirming"&&inRange(o.date,o.did));
  const pending=ords.flatMap(o=>
    inRange(o.date,o.did)?(o.pendingPays||[]).map(p=>({...p,oid:o.id,mktName:mn(mkts,o.mid),orderTot:o.tot,orderPaid:o.paid})):[]
  );

  const totalDelivSum=confirming.reduce((s,o)=>s+o.tot,0);
  const totalPaySum=pending.reduce((s,p)=>s+p.amt,0);

  return(
    <div>
      <div style={{fontSize:19,fontWeight:800,marginBottom:14}}>Платежи и доставки</div>

      <div style={{...Card,marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:"#60a5fa",marginBottom:10}}>🔍 ФИЛЬТРЫ</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
          <div style={{flex:1,minWidth:160}}>

            <select value={driverId} onChange={e=>setDriverId(e.target.value)} style={{...inp,marginBottom:0}}>
              <option value="">Все доставщики</option>
              {drivers.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}

          <div style={{flex:1,minWidth:130}}>
            <div style={lbl}>С даты</div>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{...inp,marginBottom:0}}/>
          </div>
          <div style={{flex:1,minWidth:130}}>
            <div style={lbl}>По дату</div>
            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{...inp,marginBottom:0}}/>
          </div>
          <button onClick={()=>{setDriverId("");setDateFrom("");setDateTo("");}}
            style={{padding:"9px 14px",borderRadius:8,border:brd,background:"transparent",color:MU,fontSize:12,cursor:"pointer",alignSelf:"flex-end"}}>
            Сбросить

        </div>
      </div>

      {(()=>{
        const totalUnits=confirming.reduce((s,o)=>s+o.items.reduce((a,i)=>a+i.q,0),0);

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11,marginBottom:18}}>
            <div style={{...Card,borderColor:"#fb923c44"}}>
              <div style={{fontSize:11,color:MU,fontWeight:700,marginBottom:6}}>🚚 К УТВЕРЖДЕНИЮ</div>
              <div style={{fontSize:22,fontWeight:800,color:"#fb923c"}}>{confirming.length} дост.</div>
              <div style={{fontSize:13,color:"#fb923c",fontWeight:700,marginTop:4}}>{fm(totalDelivSum)}</div>
              <div style={{fontSize:12,color:MU,marginTop:3}}>📦 {totalUnits} ед. товара</div>
            </div>
            <div style={{...Card,borderColor:"#ff8c0044"}}>
              <div style={{fontSize:11,color:MU,fontWeight:700,marginBottom:6}}>💰 К ПОДТВЕРЖДЕНИЮ</div>
              <div style={{fontSize:22,fontWeight:800,color:"#ff8c00"}}>{pending.length} оплат</div>
              <div style={{fontSize:13,color:"#ff8c00",fontWeight:700,marginTop:4}}>{fm(totalPaySum)}</div>
            </div>
          </div>
        );
      })()}

      <div style={{fontSize:12,fontWeight:700,color:MU,letterSpacing:1,marginBottom:10}}>🚚 ПОДТВЕРЖДЕНИЕ ДОСТАВОК</div>
      {confirming.length===0&&<div style={{...Card,marginBottom:16,fontSize:13,color:MU,textAlign:"center",padding:"18px"}}>Нет доставок на подтверждение</div>}
      {confirming.map(o=>{
        const m=mkts.find(x=>x.id===o.mid)||{};
        const d=USERS.find(u=>u.id===o.did)||{};
        return(
          <div key={o.id} style={{...Card,marginBottom:10,borderColor:"#fb923c44"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>

                <div style={{fontWeight:700,fontSize:14}}>{m.name}</div>

      {pending.length===0&&<div style={{...Card,fontSize:13,color:MU,textAlign:"center",padding:"18px"}}>Нет оплат на подтверждение</div>}
      {pending.map(p=>(
        <div key={p.id} style={{...Card,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div>
              <div style={{fontWeight:700,fontSize:15}}>{p.mktName}</div>
              <div style={{fontSize:12,color:MU}}>{fd(p.date)} · {p.method==="cash"?"💵 Наличные":"🏦 Перечисление"}</div>

            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:MU,fontWeight:700}}>СУММА</div>

function MgrOrders({ords,prods,mkts,onUpd,onPay,onOpenAssign}){
  const[filter,setFilter]=useState("all");
  const[search,setSearch]=useState("");
  const filters=[
    {id:"all",l:"Все",c:MU},
    {id:"pending",l:"Ожидает",c:"#f59e0b"},
    {id:"approved",l:"Одобрено",c:"#60a5fa"},
    {id:"in_delivery",l:"В доставке",c:"#a78bfa"},
    {id:"confirming",l:"На утверждении",c:"#fb923c"},
    {id:"delivered",l:"Доставлено",c:"#ff8c00"},
    {id:"cancelled",l:"Отменено",c:"#f87171"},
  ];
  const counts={};
  ords.forEach(o=>{counts[o.status]=(counts[o.status]||0)+1;});
  const filtered=ords.filter(o=>{
    if(filter!=="all"&&o.status!==filter) return false;
    if(search){const s=search.toLowerCase();const m=mkts.find(x=>x.id===o.mid)||{};if(!m.name?.toLowerCase().includes(s))return false;}
    return true;
  });
  return(
    <div>
      <div style={{fontSize:19,fontWeight:800,marginBottom:14}}>Заказы</div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Поиск по маркету..." style={{...inp,marginBottom:12}}/>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
        {filters.map(f=>(
          <button key={f.id} onClick={()=>setFilter(f.id)}
            style={{padding:"6px 12px",borderRadius:20,border:"1px solid "+(filter===f.id?f.c:BD),
              cursor:"pointer",fontSize:12,fontWeight:600,
              background:filter===f.id?f.c+"22":"transparent",color:filter===f.id?f.c:MU,whiteSpace:"nowrap"}}>
            {f.l}{f.id!=="all"&&counts[f.id]>0&&<span style={{marginLeft:4,background:f.c,color:"#fff",borderRadius:10,padding:"0 5px",fontSize:10}}>{counts[f.id]}</span>}
            {f.id==="all"&&<span style={{marginLeft:4,background:BD,color:MU,borderRadius:10,padding:"0 5px",fontSize:10}}>{ords.length}</span>}
          </button>
        ))}
      </div>
      <div style={{fontSize:11,color:MU,marginBottom:10}}>{filtered.length} заказов</div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:MU}}>📋 Нет заказов</div>}
      {filtered.map(o=><MgrOrdCard key={o.id} o={o} prods={prods} mkts={mkts} onUpd={onUpd} onPay={onPay} onOpenAssign={onOpenAssign}/>)}
    </div>
  );
}

function WhSummary({ords,prods,whl,mkts,onConfirmDispatch,onReturnDebt}){
  const drivers=USERS.filter(u=>u.role==="driver");
  const[driverId,setDriverId]=useState("");
  const[dateFrom,setDateFrom]=useState("");
  const[dateTo,setDateTo]=useState("");
  const[took,setTook]=useState({});
  const[returned,setReturned]=useState({});
  const[flash,setFlash]=useState(false);
  const[dispatchConfirmed,setDispatchConfirmed]=useState(false);
  const[prevConfirmed,setPrevConfirmed]=useState([]);

  const inRange=o=>{
    if(driverId&&o.did!==+driverId) return false;
    if(dateFrom&&o.date<dateFrom) return false;
    if(dateTo&&o.date>dateTo) return false;
    return true;
  };

  const inDelivery=ords.filter(o=>o.status==="in_delivery"&&inRange(o));
  const confirming=ords.filter(o=>o.status==="confirming"&&inRange(o));
  const delivered=ords.filter(o=>o.status==="delivered"&&inRange(o));
  const retQty=(whl||[]).filter(e=>e.type==="ret").reduce((s,e)=>s+e.q,0);

  // Заказано по товарам
  const orderedByProd={};
  inDelivery.forEach(o=>o.items.forEach(it=>{
    orderedByProd[it.pid]=(orderedByProd[it.pid]||0)+it.q;
  }));

  // Доставил клиентам (из статусов delivered+confirming)
  const delivByProd={};
  [...delivered,...confirming].forEach(o=>o.items.forEach(it=>{
    delivByProd[it.pid]=(delivByProd[it.pid]||0)+it.q;
  }));

  const rows=Object.keys(orderedByProd)
    .map(pid=>({pid:+pid, ordered:orderedByProd[pid], deliv:delivByProd[pid]||0}))
    .sort((a,b)=>b.ordered-a.ordered);

  const anyFilled=rows.some(r=>took[r.pid]!==undefined&&took[r.pid]!=="");
  const getTook=r=>took[r.pid]!==undefined&&took[r.pid]!==""?+took[r.pid]:null;
  // Должен складу = взял - доставил
  const getDebt=r=>{const t=getTook(r);if(t===null)return null;return Math.max(0,t-r.deliv);};
  // Остаток заказа = заказано - взял
  const getRemaining=r=>{const t=getTook(r);if(t===null)return r.ordered;return Math.max(0,r.ordered-t);};

  const totalOrdered=rows.reduce((s,r)=>s+r.ordered,0);
  const totalTook=rows.reduce((s,r)=>s+(getTook(r)||0),0);
  const totalDebt=rows.reduce((s,r)=>s+(getDebt(r)||0),0);

  const handleConfirm=()=>{
    const items=rows.filter(r=>getTook(r)!==null).map(r=>({pid:r.pid,ordered:r.ordered,took:getTook(r)}));
    if(onConfirmDispatch) onConfirmDispatch(items);
    setPrevConfirmed(items);
    setDispatchConfirmed(true);
    setReturned({});
    setFlash(true);
    setTimeout(()=>setFlash(false),2000);
  };

  const thS={padding:"8px 10px",fontSize:11,fontWeight:700,color:MU,borderBottom:"2px solid "+BD,textAlign:"right",whiteSpace:"nowrap"};
  const tdS={padding:"8px 10px",fontSize:13,borderBottom:"1px solid "+BD,verticalAlign:"middle"};

  return(
    <div>
      <div style={{fontSize:19,fontWeight:800,marginBottom:14}}>📋 Сводка отгрузок</div>

      <div style={{...Card,marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:MU,marginBottom:10}}>🔍 ФИЛЬТРЫ</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
          <div style={{flex:1,minWidth:160}}>
            <div style={lbl}>Доставщик</div>
            <select value={driverId} onChange={e=>setDriverId(e.target.value)} style={{...inp,marginBottom:0}}>
              <option value="">Все доставщики</option>
              {drivers.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
            </select>
          </div>
          <div style={{flex:1,minWidth:130}}>
            <div style={lbl}>С даты</div>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{...inp,marginBottom:0}}/>
          </div>
          <div style={{flex:1,minWidth:130}}>
            <div style={lbl}>По дату</div>
            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{...inp,marginBottom:0}}/>
          </div>
          <button onClick={()=>{setDriverId("");setDateFrom("");setDateTo("");}}
            style={{padding:"9px 14px",borderRadius:8,border:brd,background:"transparent",color:MU,fontSize:12,cursor:"pointer",alignSelf:"flex-end"}}>
            Сбросить
          </button>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,marginBottom:18}}>
        {[
          {l:"✅ Доставлено",     v:delivered.reduce((s,o)=>s+o.items.reduce((a,i)=>a+i.q,0),0),c:"#ff8c00"},
          {l:"⏳ На утверждении", v:confirming.reduce((s,o)=>s+o.items.reduce((a,i)=>a+i.q,0),0),c:"#fb923c"},
          {l:"🚚 В доставке",     v:totalOrdered,c:"#a78bfa"},
          {l:"↩ Возвраты",        v:retQty,c:"#34d399"},
        ].map(k=>(
          <div key={k.l} style={Card}>
            <div style={{fontSize:10,color:MU,fontWeight:700,marginBottom:4}}>{k.l}</div>
            <div style={{fontSize:20,fontWeight:800,color:k.c}}>{k.v} ед.</div>
          </div>
        ))}
      </div>

      <div style={{fontSize:12,fontWeight:700,color:MU,letterSpacing:1,marginBottom:8}}>ПО ТОВАРАМ</div>
      <div style={{fontSize:11,color:MU,marginBottom:12}}>
        Утром: введите «Взял» → Подтвердить. &nbsp;|&nbsp; Вечером: нажмите ✅ когда доставщик вернул остаток.
      </div>

      {rows.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:MU}}>Нет товаров в доставке</div>}

      {rows.length>0&&(
        <div>
          <div style={{...Card,padding:0,overflow:"auto",marginBottom:12}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:500}}>
              <thead>
                <tr style={{background:BG}}>
                  <th style={{...thS,textAlign:"left",padding:"10px 14px"}}>Товар</th>
                  <th style={{...thS,color:"#ff8c00"}}>На складе</th>
                  <th style={{...thS,color:"#f59e0b"}}>Заказано</th>
                  <th style={{...thS,color:"#a78bfa"}}>Взял ✏</th>
                  <th style={{...thS,color:"#f87171"}}>Должен складу</th>
                </tr>
              </thead>
              <tbody>
                {rows.map(r=>{
                  const p=prods.find(x=>x.id===r.pid)||{};
                  const stock=p.stock||0;
                  const tookVal=took[r.pid]!==undefined?took[r.pid]:"";
                  const remaining=getRemaining(r);
                  const debt=getDebt(r);
                  const isReturned=returned[r.pid];
                  return(
                    <tr key={r.pid}>
                      <td style={{...tdS,textAlign:"left",padding:"10px 14px"}}>
                        <div style={{fontWeight:700}}>{p.name}</div>
                        <div style={{fontSize:11,color:MU}}>{p.unit}</div>
                      </td>
                      <td style={{...tdS,textAlign:"right",fontWeight:700,color:"#ff8c00"}}>{stock}</td>
                      <td style={{...tdS,textAlign:"right",fontWeight:800,color:tookVal!==""?"#ff8c00":"#f59e0b"}}>{remaining}</td>
                      <td style={{...tdS,textAlign:"right",padding:"6px 8px"}}>
                        <input type="number" value={tookVal}
                          onChange={e=>{setTook(prev=>({...prev,[r.pid]:e.target.value}));if(dispatchConfirmed)setDispatchConfirmed(false);}}
                          placeholder="0"
                          style={{width:68,background:BG,border:"1px solid "+(tookVal!==""?"#a78bfa":BD),
                            borderRadius:6,padding:"5px 6px",color:"#a78bfa",fontSize:14,fontWeight:700,
                            textAlign:"center",outline:"none"}}/>
                      </td>
                      <td style={{...tdS,textAlign:"right",padding:"6px 8px"}}>
                        {isReturned?(
                          <span style={{color:"#ff8c00",fontSize:18}}>✅</span>
                        ):debt===null?(
                          <span style={{color:MU}}>—</span>
                        ):debt===0?(
                          <span style={{color:"#ff8c00",fontSize:18}}>✅</span>
                        ):( 
                          <button onClick={()=>{
                            if(onReturnDebt) onReturnDebt(r.pid,debt);
                            setReturned(prev=>({...prev,[r.pid]:true}));
                          }}
                          style={{background:"#f8717120",border:"1px solid #f87171",borderRadius:7,
                            padding:"5px 9px",color:"#f87171",fontWeight:800,fontSize:12,cursor:"pointer",
                            whiteSpace:"nowrap"}}>
                            {debt} ед. ✅
                          </button>
                        )}
                      </td>
                    </tr>
                  );
                })}
                <tr style={{background:BG}}>
                  <td style={{...tdS,textAlign:"left",padding:"10px 14px",fontWeight:800}}>Итого</td>
                  <td style={{...tdS,textAlign:"right",fontWeight:800,color:"#ff8c00"}}>{rows.reduce((s,r)=>s+(prods.find(x=>x.id===r.pid)?.stock||0),0)}</td>
                  <td style={{...tdS,textAlign:"right",fontWeight:800,color:"#f59e0b"}}>{rows.reduce((s,r)=>s+getRemaining(r),0)}</td>
                  <td style={{...tdS,textAlign:"right",fontWeight:800,color:"#a78bfa"}}>{anyFilled?totalTook:"—"}</td>
                  <td style={{...tdS,textAlign:"right",fontWeight:800,color:totalDebt>0?"#f87171":"#ff8c00"}}>{anyFilled?totalDebt>0?totalDebt+" ед.":"✅":"—"}</td>
                </tr>
              </tbody>
            </table>
          </div>

          {anyFilled&&(
            <button onClick={handleConfirm}
              style={{...Btn(flash?"#e65c00":"#ff8c00"),color:"#0d1117",width:"100%",padding:12,fontSize:14,marginBottom:4}}>
              {flash?"✅ Сохранено! Можно заполнять снова":"✓ Подтвердить отгрузку"}
            </button>
          )}
        </div>
      )}
    </div>
  );
}

function AdminOrders({ords,prods,mkts,ordProps,onOpenAssign,users}){
  const drivers=(users||USERS).filter(u=>u.role==="driver");
  const[filter,setFilter]=useState("all");
  const[driverId,setDriverId]=useState("");
  const[dateFrom,setDateFrom]=useState("");
  const[dateTo,setDateTo]=useState("");
  const[search,setSearch]=useState("");

  const filters=[
    {id:"all",       l:"Все",              c:MU},
    {id:"pending",   l:"Ожидает",          c:"#f59e0b"},
    {id:"approved",  l:"Одобрено",         c:"#60a5fa"},
    {id:"in_delivery",l:"В доставке",      c:"#a78bfa"},
    {id:"confirming",l:"На утверждении",   c:"#fb923c"},
    {id:"delivered", l:"Доставлено",       c:"#ff8c00"},
    {id:"cancelled", l:"Отменено",         c:"#f87171"},
  ];
  const counts={};
  ords.forEach(o=>{counts[o.status]=(counts[o.status]||0)+1;});

  const filtered=[...ords].filter(o=>{
    if(filter!=="all"&&o.status!==filter) return false;
    if(driverId&&o.did!==+driverId) return false;
    if(dateFrom&&o.date<dateFrom) return false;
    if(dateTo&&o.date>dateTo) return false;
    if(search){
      const s=search.toLowerCase();
      const m=mkts.find(x=>x.id===o.mid)||{};
      if(!m.name?.toLowerCase().includes(s)) return false;
    }
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));

  const totalFiltered=filtered.reduce((s,o)=>s+o.tot,0);
  const totalDebt=filtered.reduce((s,o)=>s+Math.max(0,o.tot-o.paid),0);

  const reset=()=>{setFilter("all");setDriverId("");setDateFrom("");setDateTo("");setSearch("");};

  return(
    <div>
      <div style={{fontSize:19,fontWeight:800,marginBottom:14}}>Все заказы</div>

      <div style={{...Card,marginBottom:14}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
          <div style={{flex:2,minWidth:150}}>
            <div style={lbl}>Поиск по маркету</div>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Название маркета..." style={{...inp,marginBottom:0}}/>
          </div>
          <div style={{flex:1,minWidth:150}}>
            <div style={lbl}>Доставщик</div>
            <select value={driverId} onChange={e=>setDriverId(e.target.value)} style={{...inp,marginBottom:0}}>
              <option value="">Все доставщики</option>
              {drivers.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
            </select>
          </div>
          <div style={{flex:1,minWidth:130}}>
            <div style={lbl}>С даты</div>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{...inp,marginBottom:0}}/>
          </div>
          <div style={{flex:1,minWidth:130}}>
            <div style={lbl}>По дату</div>
            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{...inp,marginBottom:0}}/>
          </div>
          <button onClick={reset} style={{padding:"9px 14px",borderRadius:8,border:brd,background:"transparent",color:MU,fontSize:12,cursor:"pointer",alignSelf:"flex-end"}}>Сбросить</button>
        </div>
      </div>

      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        {filters.map(f=>(
          <button key={f.id} onClick={()=>setFilter(f.id)}
            style={{padding:"6px 12px",borderRadius:20,border:"1px solid "+(filter===f.id?f.c:BD),
              cursor:"pointer",fontSize:12,fontWeight:600,
              background:filter===f.id?f.c+"22":"transparent",color:filter===f.id?f.c:MU,whiteSpace:"nowrap"}}>
            {f.l}
            {f.id!=="all"&&counts[f.id]>0&&<span style={{marginLeft:4,background:f.c,color:"#fff",borderRadius:10,padding:"0 5px",fontSize:10}}>{counts[f.id]}</span>}
            {f.id==="all"&&<span style={{marginLeft:4,background:BD,color:MU,borderRadius:10,padding:"0 5px",fontSize:10}}>{ords.length}</span>}
          </button>
        ))}
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:11,color:MU}}>{filtered.length} заказов</div>
        <div style={{display:"flex",gap:16,fontSize:12}}>
          <span>Сумма: <span style={{fontWeight:700,color:TX}}>{fm(totalFiltered)}</span></span>
          <span>Долг: <span style={{fontWeight:700,color:"#f87171"}}>{fm(totalDebt)}</span></span>
        </div>
      </div>

      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:MU}}>📋 Нет заказов по фильтру</div>}
      {filtered.map(o=><OrdCard key={o.id} o={o} {...ordProps} onOpenAssign={onOpenAssign}/>)}
    </div>
  );
}


const ROLES=[
  {id:"admin",    label:"Администратор"},
  {id:"manager",  label:"Менеджер"},
  {id:"agent",    label:"Агент"},
  {id:"driver",   label:"Доставщик"},
  {id:"warehouse",label:"Завхоз (Склад)"},
  {id:"distrib",  label:"Завхоз (РП)"},

];

function StaffManager({users,setUsers,currentUserId}){

  const[editUser,setEditUser]=useState(null);
  const[newU,setNewU]=useState({name:"",login:"",pass:"",role:"agent"});

  const addUser=()=>{
    if(!newU.name||!newU.login||!newU.pass) return;
    const rl=ROLES.find(r=>r.id===newU.role)?.label||"";
    setUsers(p=>[...p,{id:Date.now(),rl,...newU}]);
    setNewU({name:"",login:"",pass:"",role:"agent"});
    setShowAdd(false);
  };
  const deleteUser=id=>{
    if(id===currentUserId) return alert("Нельзя удалить себя!");
    if(window.confirm("Удалить сотрудника?")) setUsers(p=>p.filter(u=>u.id!==id));
  };
  const saveEdit=()=>{
    if(!editUser.name||!editUser.login) return;
    const rl=ROLES.find(r=>r.id===editUser.role)?.label||editUser.rl;
    setUsers(p=>p.map(u=>u.id===editUser.id?{...editUser,rl}:u));
    setEditUser(null);
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:19,fontWeight:800}}>Сотрудники</div>

            <div><div style={lbl}>Логин *</div><input value={newU.login} onChange={e=>setNewU(p=>({...p,login:e.target.value}))} placeholder="login" style={{...inp,marginBottom:0}}/></div>
            <div><div style={lbl}>Пароль *</div><input value={newU.pass} onChange={e=>setNewU(p=>({...p,pass:e.target.value}))} placeholder="пароль" style={{...inp,marginBottom:0}}/></div>
            <div><div style={lbl}>Роль *</div>
              <select value={newU.role} onChange={e=>setNewU(p=>({...p,role:e.target.value}))} style={{...inp,marginBottom:0}}>
                {ROLES.map(r=><option key={r.id} value={r.id}>{r.label}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowAdd(false)} style={{flex:1,padding:9,borderRadius:8,border:brd,background:"transparent",color:MU,fontSize:13,cursor:"pointer"}}>Отмена</button>
            <button onClick={addUser} style={{...Btn(),flex:2,padding:9,fontSize:13}}>Добавить сотрудника</button>
          </div>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:11}}>
        {users.map(u=>(
          <div key={u.id} style={{...Card,position:"relative"}}>
            {editUser?.id===u.id?(
              <div>
                <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:"#60a5fa"}}>✏ Редактировать</div>

function RareMkts({mkts,vis,userId,onNewVisit}){
  // Count visits per market by this merch
  const visitCounts={};
  vis.filter(v=>v.uid===userId).forEach(v=>{
    visitCounts[v.mid]=(visitCounts[v.mid]||0)+1;
  });
  // Last visit date per market
  const lastVisit={};
  vis.filter(v=>v.uid===userId).forEach(v=>{
    if(!lastVisit[v.mid]||v.date>lastVisit[v.mid]) lastVisit[v.mid]=v.date;
  });
  // Sort markets by visit count ascending (least visited first)
  const sorted=[...mkts].sort((a,b)=>(visitCounts[a.id]||0)-(visitCounts[b.id]||0));

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontSize:19,fontWeight:800}}>⚠ Редкие визиты</div>
          <div style={{fontSize:12,color:MU,marginTop:2}}>Маркеты с наименьшим числом посещений</div>
        </div>
        <button style={Btn()} onClick={onNewVisit}>+ Визит</button>
      </div>
      {sorted.map((m,idx)=>{
        const cnt=visitCounts[m.id]||0;
        const last=lastVisit[m.id];
        const daysSince=last?Math.floor((Date.now()-new Date(last))/(1000*60*60*24)):null;
        const urgent=cnt===0||daysSince>30;
        const warn=daysSince>14&&daysSince<=30;
        const bc=cnt===0?"#f87171":urgent?"#f59e0b":warn?"#f59e0b":"#ff8c00";
        return(
          <div key={m.id} style={{...Card,marginBottom:10,borderColor:urgent?bc+"66":warn?bc+"44":BD}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontSize:16,fontWeight:800,color:MU,minWidth:24}}>#{idx+1}</span>
                  <div style={{fontWeight:700,fontSize:14}}>{m.name}</div>
                </div>
                <div style={{fontSize:12,color:MU,marginBottom:2}}>📍 {m.addr}</div>
                <a href={"tel:"+m.tel} style={{fontSize:12,color:"#60a5fa",textDecoration:"none"}}>☎ {m.tel}</a>
              </div>
              <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                <div style={{fontSize:22,fontWeight:800,color:bc}}>{cnt}</div>
                <div style={{fontSize:11,color:MU}}>визитов</div>
                {last?(
                  <div style={{fontSize:11,marginTop:4,color:urgent?"#f87171":warn?"#f59e0b":MU,fontWeight:urgent||warn?700:400}}>
                    {daysSince===0?"Сегодня":daysSince===1?"Вчера":daysSince+" дн. назад"}
                  </div>
                ):<div style={{fontSize:11,color:"#f87171",fontWeight:700,marginTop:4}}>Не посещён</div>}
              </div>
            </div>
            {cnt===0&&(
              <div style={{background:"#f8717120",borderRadius:7,padding:"6px 10px",marginTop:10,fontSize:12,color:"#f87171",fontWeight:600}}>
                ⚠ Ни разу не посещён — нужен визит!
              </div>
            )}
            {cnt>0&&urgent&&(
              <div style={{background:"#f59e0b20",borderRadius:7,padding:"6px 10px",marginTop:10,fontSize:12,color:"#f59e0b",fontWeight:600}}>
                ⏰ Последний визит более {daysSince} дней назад
              </div>
            )}
            <button style={{...Btn("#1f6feb"),width:"100%",padding:8,fontSize:12,marginTop:10}}
              onClick={onNewVisit}>+ Новый визит в этот маркет</button>
          </div>
        );
      })}
    </div>
  );
}


function ActualDispatchModal({ord,prods,onClose,onSave}){
  const[items,setItems]=useState(
    ord.items.map(it=>({pid:it.pid,ordered:it.q,actual:String(it.q)}))
  );
  const go=()=>{
    const result=items.map(i=>({pid:i.pid,ordered:i.ordered,actual:+i.actual||0}));
    onSave(ord.id,result);
  };
  return(
    <div style={OVL} onClick={onClose}>
      <div style={MDL} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:16,fontWeight:800,marginBottom:4}}>📦 Фактическая отгрузка</div>
        <div style={{fontSize:12,color:MU,marginBottom:16}}>Введите сколько реально отгрузили доставщику</div>
        <div style={{background:BG,borderRadius:8,padding:11,marginBottom:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 80px 80px",gap:8,marginBottom:8}}>
            <div style={{fontSize:11,color:MU,fontWeight:700}}>ТОВАР</div>
            <div style={{fontSize:11,color:MU,fontWeight:700,textAlign:"center"}}>ЗАКАЗ</div>
            <div style={{fontSize:11,color:"#ff8c00",fontWeight:700,textAlign:"center"}}>ФАКТ</div>
          </div>
          {items.map((it,idx)=>{
            const p=prods.find(x=>x.id===it.pid)||{};
            const diff=it.ordered-(+it.actual||0);
            return(
              <div key={it.pid} style={{display:"grid",gridTemplateColumns:"1fr 80px 80px",gap:8,alignItems:"center",marginBottom:10}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13}}>{p.name}</div>
                  <div style={{fontSize:11,color:MU}}>{p.unit}</div>
                </div>
                <div style={{textAlign:"center",fontSize:15,fontWeight:700,color:MU}}>{it.ordered}</div>
                <div>
                  <input type="number" value={it.actual}
                    onChange={e=>setItems(prev=>prev.map((x,i)=>i===idx?{...x,actual:e.target.value}:x))}
                    style={{...inp,marginBottom:0,textAlign:"center",fontWeight:700,
                      borderColor:diff>0?"#f59e0b":diff<0?"#f87171":"#ff8c00",
                      color:diff>0?"#f59e0b":diff<0?"#f87171":"#ff8c00"}}/>
                </div>
              </div>
            );
          })}
          {items.some(it=>it.ordered-(+it.actual||0)>0)&&(
            <div style={{background:"#f59e0b20",borderRadius:7,padding:9,marginTop:6,fontSize:12,color:"#f59e0b"}}>
              ⚠ Остаток остаётся на складе: {items.map(it=>{
                const p=prods.find(x=>x.id===it.pid)||{};
                const diff=it.ordered-(+it.actual||0);
                return diff>0?diff+" "+p.unit+" "+p.name:null;
              }).filter(Boolean).join(", ")}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:9}}>
          <button onClick={onClose} style={{flex:1,padding:10,borderRadius:8,border:brd,background:"transparent",color:MU,fontSize:13,cursor:"pointer"}}>Отмена</button>
          <button onClick={go} style={{...Btn("#ff8c00"),color:"#0d1117",flex:2,padding:10,fontSize:14}}>✓ Подтвердить отгрузку</button>
        </div>
      </div>
    </div>
  );
}

      {assignOrdId&&<AssignModal ordId={assignOrdId} onClose={()=>setAssignOrdId(null)} onSave={doAssign} users={users}/>}

      {mod==="wh_in"&&<WhMod title="Приход на склад" bl="Оприходовать" bg="#1f6feb" prods={prods} onClose={()=>setMod(null)} onSave={(p,q,n)=>{whAct("in",p,q,n,"main");setMod(null);}}/>}
      {mod==="wh_wo"&&<WhMod title="Списание со склада" bl="Списать" bg="#da3633" prods={prods} onClose={()=>setMod(null)} onSave={(p,q,n)=>{whAct("wo",p,q,n,"main");setMod(null);}}/>}
      {mod==="wh_tr"&&<WhMod title="Передача в РП" bl="Передать" bg="#f59e0b" prods={prods} onClose={()=>setMod(null)} onSave={(p,q,n)=>{transferDP(p,q,n);setMod(null);}}/>}

      {mod==="dp_wo"&&<WhMod title="Списание с РП" bl="Списать" bg="#da3633" prods={prods} onClose={()=>setMod(null)} onSave={(p,q,n)=>{whAct("wo",p,q,n,"dp");setMod(null);}}/>}
      {mod==="ep"&&<ProdMod prod={md.prod||null} onClose={()=>setMod(null)} onSave={d=>{md.prod?setProds(p=>p.map(x=>x.id===md.prod.id?{...x,...d}:x)):setProds(p=>[...p,{id:ni(),stock:0,dp:0,...d}]);setMod(null);}}/>}
      {mod==="add_mkt"&&<MktMod onClose={()=>setMod(null)} onSave={d=>{setMkts(p=>[...p,{id:ni(),...d,by:user.id,addedDate:tod()}]);setMod(null);}}/>}
    </div>
  );
}

function NewOrdForm({prods,mkts,onSubmit,onCancel,title}){
  const[f,setF]=useState({mid:"",date:tod(),type:"cons",note:"",items:[{pid:"",q:""}]});
  const tot=f.items.reduce((s,i)=>s+(pp(prods,+i.pid)||0)*(+i.q||0),0);
  const go=()=>{if(!f.mid||f.items.some(i=>!i.pid||!i.q))return;onSubmit(f);};
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:19,fontWeight:800}}>{title||"Новая заявка"}</div>
        <button onClick={onCancel} style={{...Btn("#21262d"),color:MU}}>Отмена</button>
      </div>
      <div style={{maxWidth:500}}><div style={Card}>
        <div style={lbl}>Маркет *</div>
        <select value={f.mid} onChange={e=>setF(p=>({...p,mid:e.target.value}))} style={inp}>
          <option value="">Выберите маркет...</option>
          {mkts.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
        </select>
        <div style={{display:"flex",gap:11}}>
          <div style={{flex:1}}><div style={lbl}>Дата</div><input type="date" value={f.date} onChange={e=>setF(p=>({...p,date:e.target.value}))} style={inp}/></div>
          <div style={{flex:1}}><div style={lbl}>Оплата</div>
            <select value={f.type} onChange={e=>setF(p=>({...p,type:e.target.value}))} style={inp}>
              <option value="cons">Под реализацию</option>
              <option value="cash">Наличные / перевод</option>
            </select>
          </div>
        </div>
        <div style={{fontSize:11,color:MU,fontWeight:700,letterSpacing:.5,marginBottom:8}}>ТОВАРЫ *</div>
        {f.items.map((it,idx)=>{
          const sp=prods.find(p=>+p.id===+it.pid);
          return(
            <div key={idx} style={{display:"flex",gap:7,marginBottom:8,alignItems:"center"}}>
              <select value={it.pid} onChange={e=>setF(p=>({...p,items:p.items.map((x,i)=>i===idx?{...x,pid:e.target.value}:x)}))} style={{...inp,flex:2,marginBottom:0}}>
                <option value="">Товар...</option>
                {prods.map(p=><option key={p.id} value={p.id}>{p.name} ({p.stock} {p.unit})</option>)}
              </select>
              <div style={{flex:1,position:"relative"}}>
                <input type="number" placeholder="0" value={it.q} onChange={e=>setF(p=>({...p,items:p.items.map((x,i)=>i===idx?{...x,q:e.target.value}:x)}))} style={{...inp,marginBottom:0,paddingRight:sp?34:12}}/>
                {sp&&<span style={{position:"absolute",right:9,top:"50%",transform:"translateY(-50%)",fontSize:10,color:MU,pointerEvents:"none"}}>{sp.unit}</span>}
              </div>
              {f.items.length>1&&<button onClick={()=>setF(p=>({...p,items:p.items.filter((_,i)=>i!==idx)}))} style={{background:"transparent",border:"none",color:"#f87171",cursor:"pointer",fontSize:19}}>×</button>}
            </div>
          );
        })}
        <button onClick={()=>setF(p=>({...p,items:[...p.items,{pid:"",q:""}]}))} style={{width:"100%",padding:7,border:"1px dashed "+BD,borderRadius:8,background:"transparent",color:"#e65c00",fontSize:12,cursor:"pointer",marginBottom:11}}>+ Добавить позицию</button>
        <div style={lbl}>Примечание</div>
        <input value={f.note} onChange={e=>setF(p=>({...p,note:e.target.value}))} placeholder="Время доставки, пожелания..." style={inp}/>
        {tot>0&&<div style={{background:BG,borderRadius:8,padding:11,marginBottom:13,display:"flex",justifyContent:"space-between",fontWeight:700}}><span>Итого</span><span>{fm(tot)}</span></div>}
        <button onClick={go} style={{...Btn(),width:"100%",padding:11,fontSize:14}}>Отправить заявку</button>
      </div></div>
    </div>
  );
}

function NewVisForm({mkts,onSubmit,onCancel}){
  const[mid,setMid]=useState(""),[ note,setNote]=useState(""),[ cl,setCl]=useState({display:false,stock:false,price:false,clean:false}),[ photosBefore,setPhotosBefore]=useState([]),[ photosAfter,setPhotosAfter]=useState([]);
  const refBefore=useRef();
  const refAfter=useRef();
  const labels={display:"Выкладка в порядке",stock:"Товар в наличии",price:"Ценники на месте",clean:"Чистота соблюдена"};
  const go=()=>{if(!mid)return;onSubmit({mid:+mid,note,cl,photosBefore,photosAfter,ok:Object.values(cl).every(Boolean)});};
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div style={{fontSize:19,fontWeight:800}}>Новый визит</div><button onClick={onCancel} style={{...Btn("#21262d"),color:MU}}>Отмена</button></div>
      <div style={{maxWidth:500}}><div style={Card}>
        <div style={lbl}>Маркет *</div>
        <select value={mid} onChange={e=>setMid(e.target.value)} style={inp}>
          <option value="">Выберите маркет...</option>
          {mkts.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
        </select>
        <div style={{fontSize:11,color:MU,fontWeight:700,letterSpacing:.5,marginBottom:10}}>ЧЕК-ЛИСТ</div>
        {Object.entries(labels).map(([k,l])=>(
          <label key={k} style={{display:"flex",alignItems:"center",gap:9,marginBottom:10,cursor:"pointer"}}>
            <div onClick={()=>setCl(p=>({...p,[k]:!p[k]}))} style={{width:20,height:20,borderRadius:5,border:"2px solid "+(cl[k]?"#ff8c00":BD),background:cl[k]?"#ff8c00":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {cl[k]&&<span style={{color:"#0d1117",fontSize:13,fontWeight:900}}>✓</span>}
            </div>
            <span style={{fontSize:13,color:cl[k]?TX:MU}}>{l}</span>
          </label>
        ))}
        <div style={{fontSize:11,color:MU,fontWeight:700,letterSpacing:.5,marginBottom:9,marginTop:4}}>ФОТО ДО / ПОСЛЕ</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:11}}>
          <div>
            <div style={{fontSize:11,color:"#60a5fa",fontWeight:700,marginBottom:7}}>📷 ДО</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
              {photosBefore.map((ph,i)=>(
                <div key={i} style={{width:54,height:54,background:"#21262d",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,position:"relative"}}>
                  {ph}
                  <button onClick={()=>setPhotosBefore(p=>p.filter((_,j)=>j!==i))} style={{position:"absolute",top:-5,right:-5,width:16,height:16,borderRadius:8,background:"#f87171",border:"none",color:"#fff",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                </div>
              ))}
              <button onClick={()=>refBefore.current.click()} style={{width:54,height:54,background:"#21262d",borderRadius:8,border:"2px dashed #60a5fa",color:"#60a5fa",fontSize:22,cursor:"pointer"}}>+</button>
            </div>
            <input ref={refBefore} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>{setPhotosBefore(p=>[...p,...[...e.target.files].map(()=>"📸")]);}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:"#ff8c00",fontWeight:700,marginBottom:7}}>📷 ПОСЛЕ</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
              {photosAfter.map((ph,i)=>(
                <div key={i} style={{width:54,height:54,background:"#21262d",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,position:"relative"}}>
                  {ph}
                  <button onClick={()=>setPhotosAfter(p=>p.filter((_,j)=>j!==i))} style={{position:"absolute",top:-5,right:-5,width:16,height:16,borderRadius:8,background:"#f87171",border:"none",color:"#fff",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                </div>
              ))}
              <button onClick={()=>refAfter.current.click()} style={{width:54,height:54,background:"#21262d",borderRadius:8,border:"2px dashed #4ade80",color:"#ff8c00",fontSize:22,cursor:"pointer"}}>+</button>
            </div>
            <input ref={refAfter} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>{setPhotosAfter(p=>[...p,...[...e.target.files].map(()=>"📸")]);}}/>
          </div>
        </div>
        <div style={lbl}>Комментарий</div>
        <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Замечания, проблемы..." style={{...inp,height:75,resize:"vertical",fontFamily:"inherit"}}/>
        <button onClick={go} style={{...Btn(),width:"100%",padding:11,fontSize:14}}>Сохранить визит</button>
      </div></div>
    </div>
  );
}

function PayMod({dbt,onClose,onSave}){
  const[a,setA]=useState(""),[ d,setD]=useState(tod()),[ n,setN]=useState("");
  return(
    <div style={OVL} onClick={onClose}><div style={MDL} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:16,fontWeight:800,marginBottom:16}}>Внести платёж</div>
      <div style={{background:BG,borderRadius:8,padding:11,marginBottom:14}}><div style={{fontSize:11,color:MU}}>Остаток долга</div><div style={{fontSize:20,fontWeight:800,color:"#f87171"}}>{fm(dbt)}</div></div>
      <div style={lbl}>Сумма *</div>
      <input type="number" value={a} onChange={e=>setA(e.target.value)} placeholder="0" style={inp}/>
      <div style={{display:"flex",gap:7,marginBottom:11}}>
        {[dbt,Math.round(dbt/2)].map(v=><button key={v} onClick={()=>setA(String(v))} style={{padding:"4px 10px",borderRadius:6,border:brd,background:BG,color:MU,fontSize:12,cursor:"pointer"}}>{fm(v)}</button>)}
      </div>
      <div style={lbl}>Дата</div><input type="date" value={d} onChange={e=>setD(e.target.value)} style={inp}/>
      <div style={lbl}>Способ</div><input value={n} onChange={e=>setN(e.target.value)} placeholder="Наличные, перевод..." style={inp}/>
      <div style={{display:"flex",gap:9}}>
        <button onClick={onClose} style={{flex:1,padding:9,borderRadius:8,border:brd,background:"transparent",color:MU,fontSize:13,cursor:"pointer"}}>Отмена</button>
        <button onClick={()=>a&&onSave(a,d,n)} style={{...Btn(),flex:1,padding:9,fontSize:13}}>Сохранить</button>
      </div>
    </div></div>
  );
}

function WhMod({title,bl,bg,prods,onClose,onSave}){
  const[p,setP]=useState(""),[ q,setQ]=useState(""),[ n,setN]=useState("");
  const sp=prods.find(x=>+x.id===+p);
  return(
    <div style={OVL} onClick={onClose}><div style={MDL} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:16,fontWeight:800,marginBottom:16}}>{title}</div>
      <div style={lbl}>Товар *</div>
      <select value={p} onChange={e=>setP(e.target.value)} style={inp}>
        <option value="">Выберите...</option>
        {prods.map(x=><option key={x.id} value={x.id}>{x.name} — {x.stock} {x.unit}</option>)}
      </select>
      <div style={lbl}>Количество ({sp?.unit||"ед."}) *</div>
      <input type="number" value={q} onChange={e=>setQ(e.target.value)} placeholder="0" style={inp}/>
      <div style={lbl}>Комментарий</div>
      <input value={n} onChange={e=>setN(e.target.value)} placeholder="Причина..." style={inp}/>
      <div style={{display:"flex",gap:9}}>
        <button onClick={onClose} style={{flex:1,padding:9,borderRadius:8,border:brd,background:"transparent",color:MU,fontSize:13,cursor:"pointer"}}>Отмена</button>
        <button onClick={()=>p&&q&&onSave(p,q,n)} style={{...Btn(bg),flex:1,padding:9,fontSize:13}}>{bl}</button>
      </div>
    </div></div>
  );
}

function ProdMod({prod,onClose,onSave}){
  const[nm,setNm]=useState(prod?.name||""),[ pr,setPr]=useState(prod?.price?String(prod.price):""),[ mn2,setMn]=useState(prod?.min?String(prod.min):""),[ un,setUn]=useState(prod?.unit||"шт");
  const go=()=>{if(!nm||!pr)return;onSave({name:nm,price:+pr,min:+mn2||0,unit:un});};
  return(
    <div style={OVL} onClick={onClose}><div style={MDL} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:16,fontWeight:800,marginBottom:16}}>{prod?"Редактировать":"Новый товар"}</div>
      <div style={lbl}>Название *</div><input value={nm} onChange={e=>setNm(e.target.value)} placeholder="Патти 100г" style={inp}/>
      <div style={{display:"flex",gap:11}}>
        <div style={{flex:2}}><div style={lbl}>Цена (сум) *</div><input type="number" value={pr} onChange={e=>setPr(e.target.value)} placeholder="4500" style={inp}/></div>
        <div style={{flex:1}}><div style={lbl}>Единица</div>
          <select value={un} onChange={e=>setUn(e.target.value)} style={inp}>
            <option>шт</option><option>кг</option><option>упак</option><option>л</option><option>блок</option>
          </select>
        </div>
      </div>
      <div style={lbl}>Мин. остаток</div><input type="number" value={mn2} onChange={e=>setMn(e.target.value)} placeholder="100" style={inp}/>
      {pr&&<div style={{background:BG,borderRadius:7,padding:9,marginBottom:11,fontSize:12,color:MU}}>Цена: <span style={{color:TX,fontWeight:700}}>{(+pr).toLocaleString("ru-RU")} сум</span> / {un}</div>}
      <div style={{display:"flex",gap:9}}>
        <button onClick={onClose} style={{flex:1,padding:9,borderRadius:8,border:brd,background:"transparent",color:MU,fontSize:13,cursor:"pointer"}}>Отмена</button>
        <button onClick={go} style={{...Btn(),flex:1,padding:9,fontSize:13}}>{prod?"Сохранить":"Добавить"}</button>
      </div>
    </div></div>
  );
}

function MktMod({onClose,onSave}){
  const[nm,setNm]=useState(""),[ addr,setAddr]=useState(""),[ tel,setTel]=useState("");
  const go=()=>{if(!nm||!tel)return;onSave({name:nm,addr,tel});};
  return(
    <div style={OVL} onClick={onClose}><div style={MDL} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:16,fontWeight:800,marginBottom:16}}>Новый маркет</div>
      <div style={lbl}>Название *</div><input value={nm} onChange={e=>setNm(e.target.value)} placeholder="Название магазина" style={inp}/>
      <div style={lbl}>Адрес</div><input value={addr} onChange={e=>setAddr(e.target.value)} placeholder="Район, улица, дом" style={inp}/>
      <div style={lbl}>Телефон *</div><input value={tel} onChange={e=>setTel(e.target.value)} placeholder="+998 90 123 45 67" style={inp}/>
      <div style={{display:"flex",gap:9}}>
        <button onClick={onClose} style={{flex:1,padding:9,borderRadius:8,border:brd,background:"transparent",color:MU,fontSize:13,cursor:"pointer"}}>Отмена</button>
        <button onClick={go} style={{...Btn(),flex:1,padding:9,fontSize:13}}>Добавить</button>
      </div>
    </div></div>
  );
}
